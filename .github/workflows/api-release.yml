name: API Publish

on:
  push:
    tags: ["api-v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Set version from tag
        if: github.ref_type == 'tag'
        run: |
          VERSION="${GITHUB_REF_NAME#api-v}"
          cd packages/api
          npm version "$VERSION" --no-git-tag-version

      - name: Install dependencies
        run: cd packages/api && bun install

      - name: Build
        run: cd packages/api && bun run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/api
          VERSION=$(node -p "require('./package.json').version")

          if npm view "@inbox-zero/api@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION is already published, skipping."
            exit 0
          fi

          npm publish --provenance --access public
