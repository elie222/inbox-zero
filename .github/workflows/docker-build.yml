name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    # Skip rebuilds for changes that can't affect the production image
    # (planning docs, READMEs, repo metadata).
    paths-ignore:
      - "**/*.md"
      - "**/*.mdx"
      - ".planning/**"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"

# Cancel any in-flight build when a newer commit lands on the same ref.
# Prevents the orphan-build scenario (40+ min build completes only to be
# immediately superseded by a newer push).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    # Native arm64 runner — production EC2 is Graviton (aarch64). Native build
    # avoids QEMU emulation (was 40+ min) and finishes in ~5 min. If we ever
    # need amd64 too, switch to a matrix build with platform-specific runners.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/rebekah-create/inbox-zero-rebekah
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.prod
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_BASE_URL=https://inbox.tdfurn.com
            NEXT_PUBLIC_BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-1
      EC2_INSTANCE_ID: ${{ vars.AWS_INSTANCE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build SSM command payload
        id: payload
        run: |
          set -euo pipefail
          COMPOSE_B64=$(base64 -w0 deploy/docker-compose.yml)
          SECRETS_B64=$(base64 -w0 deploy/load-secrets.sh)
          # Write SSM parameters to a JSON file so we don't have to escape
          # nested quotes on the CLI. The remote shell decodes the blobs,
          # installs them under /opt/inbox-zero, refreshes .env from SSM
          # (so any rotated secrets land in the container), and pulls/restarts.
          jq -n \
            --arg compose "$COMPOSE_B64" \
            --arg secrets "$SECRETS_B64" \
            '{
              commands: [
                "set -e",
                ("echo " + $compose + " | base64 -d > /tmp/docker-compose.yml"),
                "sudo install -m 0644 -o root -g root /tmp/docker-compose.yml /opt/inbox-zero/docker-compose.yml",
                "rm -f /tmp/docker-compose.yml",
                ("echo " + $secrets + " | base64 -d > /tmp/load-secrets.sh"),
                "sudo install -m 0755 -o root -g root /tmp/load-secrets.sh /opt/inbox-zero/load-secrets.sh",
                "rm -f /tmp/load-secrets.sh",
                "sudo /opt/inbox-zero/load-secrets.sh",
                "cd /opt/inbox-zero",
                "docker system prune -f --filter until=24h",
                "docker compose pull app",
                "docker compose up -d app cron"
              ]
            }' > /tmp/ssm-params.json

      - name: Send deploy command via SSM
        id: send
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "inbox-zero deploy ${{ github.sha }}" \
            --parameters file:///tmp/ssm-params.json \
            --query Command.CommandId \
            --output text)
          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "Sent SSM command: $CMD_ID"

      - name: Wait for SSM command to complete
        env:
          CMD_ID: ${{ steps.send.outputs.command_id }}
        run: |
          set -euo pipefail
          # Poll every 5s for up to 5 minutes. Status flow:
          # Pending → InProgress → Success | Failed | TimedOut | Cancelled
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo "Pending")
            echo "  [$i/60] status: $STATUS"
            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query StandardOutputContent --output text
                exit 0
                ;;
              Cancelled|TimedOut|Failed)
                echo "::error::SSM command $CMD_ID ended in status $STATUS"
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "$EC2_INSTANCE_ID"
                exit 1
                ;;
            esac
            sleep 5
          done
          echo "::error::Timed out waiting for SSM command $CMD_ID"
          exit 1
