name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    # Skip rebuilds for changes that can't affect the production image
    # (planning docs, READMEs, repo metadata).
    paths-ignore:
      - "**/*.md"
      - "**/*.mdx"
      - ".planning/**"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"

# Cancel any in-flight build when a newer commit lands on the same ref.
# Prevents the orphan-build scenario (40+ min build completes only to be
# immediately superseded by a newer push).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    # Native arm64 runner — production EC2 is Graviton (aarch64). Native build
    # avoids QEMU emulation (was 40+ min) and finishes in ~5 min. If we ever
    # need amd64 too, switch to a matrix build with platform-specific runners.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rebekah-create/inbox-zero-rebekah
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.prod
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_BASE_URL=https://inbox.tdfurn.com
            NEXT_PUBLIC_BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/inbox-zero
            docker system prune -f --filter "until=24h"
            docker compose pull app
            docker compose up -d app
