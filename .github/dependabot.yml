# Dependabot config for the rebekah-create/inbox-zero-rebekah self-hosted fork.
#
# Goals: surface security advisories and groom dep drift, but don't drown a
# solo maintainer in PRs. Strategy:
#   - Weekly cadence (Monday morning) — single batched review window.
#   - Group non-major bumps by ecosystem so it's one PR to skim, not 30.
#   - Major-version bumps stay individual — those need real review.
#   - Cap open PRs at 5 to keep noise bounded.
#
# Security-only updates (CVEs) bypass these settings and arrive immediately.

version: 2

updates:
  # Top-level workspace dependencies (pnpm monorepo)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    # Mirror the .ncurc.cjs reject list — packages we deliberately pin.
    # Update both files together when unpinning.
    ignore:
      # Staying on Tailwind v3 — v4 has significant breaking changes
      - dependency-name: "tailwindcss"
      - dependency-name: "@tailwindcss/forms"
      - dependency-name: "@tailwindcss/typography"
      - dependency-name: "@headlessui/tailwindcss"
      - dependency-name: "tailwind-merge"
      - dependency-name: "tailwindcss-animate"
      - dependency-name: "postcss"
      - dependency-name: "autoprefixer"
      # >=27.4.0 has ESM/CJS incompatibility that breaks Vercel runtime
      - dependency-name: "jsdom"
      # Tiptap majors have heavy breaking changes
      - dependency-name: "@tiptap/extension-mention"
      - dependency-name: "@tiptap/extension-placeholder"
      - dependency-name: "@tiptap/pm"
      - dependency-name: "@tiptap/react"
      - dependency-name: "@tiptap/starter-kit"
      - dependency-name: "@tiptap/suggestion"
      - dependency-name: "tiptap-markdown"
      - dependency-name: "react-resizable-panels"
      - dependency-name: "recharts"
      - dependency-name: "@chronark/zod-bird"
      # v9+ breaks the shadcn/ui date picker
      - dependency-name: "react-day-picker"
      # v4 has breaking changes with Tinybird
      - dependency-name: "zod"
      # v5 imports zod/v4/core; keep pinned while app stays on Zod 3
      - dependency-name: "@hookform/resolvers"
      # 0.71.6+ breaks Turbopack production builds (jsonpath/EBADF)
      - dependency-name: "dub"
      - dependency-name: "@types/node"
    groups:
      # Bundle minor + patch updates so the weekly review is one PR per group
      # instead of N. Major updates stay separate (more risk, more attention).
      production-deps:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-deps:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
    # Node major bumps must be coordinated across Dockerfile, .nvmrc, and
    # both package.json engines fields. Patch/minor still flow through.
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
