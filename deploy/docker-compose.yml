# /opt/inbox-zero/docker-compose.yml
# Copy this file to the server: scp docker-compose.yml ubuntu@<IP>:/opt/inbox-zero/
# Also copy .env to the same location before running: docker compose up -d

services:

  # -----------------------------------------------------------------------
  # Postgres
  # -----------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: inbox-zero-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: inboxzero
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: inboxzero
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inboxzero"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # Inbox Zero
  # -----------------------------------------------------------------------
  app:
    image: ghcr.io/rebekah-create/inbox-zero-rebekah:latest
    container_name: inbox-zero-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"   # Only accessible via nginx, not public
    environment:
      # App
      NEXTAUTH_URL: https://inbox.tdfurn.com
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_ALLOWED_EMAILS: ${AUTH_ALLOWED_EMAILS}

      # Database
      DATABASE_URL: postgresql://inboxzero:${POSTGRES_PASSWORD}@postgres:5432/inboxzero

      # Redis (Upstash — secrets loaded from Parameter Store via load-secrets.sh)
      UPSTASH_REDIS_URL: ${UPSTASH_REDIS_URL}
      UPSTASH_REDIS_TOKEN: ${UPSTASH_REDIS_TOKEN}

      # Google OAuth (from Google Cloud Console)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      # Google encryption
      GOOGLE_ENCRYPT_SECRET: ${GOOGLE_ENCRYPT_SECRET}
      GOOGLE_ENCRYPT_SALT: ${GOOGLE_ENCRYPT_SALT}

      # Google PubSub (for real-time Gmail webhooks)
      GOOGLE_PUBSUB_TOPIC_NAME: ${GOOGLE_PUBSUB_TOPIC_NAME}
      GOOGLE_PUBSUB_VERIFICATION_TOKEN: ${GOOGLE_PUBSUB_VERIFICATION_TOKEN}

      # LLM — using Anthropic (Claude)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Email sending via SES (SMTP)
      EMAIL_FROM: inbox-digest@tdfurn.com
      EMAIL_SERVER_HOST: email-smtp.us-east-1.amazonaws.com
      EMAIL_SERVER_PORT: 587
      EMAIL_SERVER_USER: ${SES_SMTP_USER}
      EMAIL_SERVER_PASSWORD: ${SES_SMTP_PASSWORD}

      # Make yourself admin (replace with your Gmail address)
      ADMINS: ${ADMIN_EMAIL}

      # App URL for webhooks
      NEXT_PUBLIC_BASE_URL: https://inbox.tdfurn.com
      EMAIL_ENCRYPT_SECRET: ${EMAIL_ENCRYPT_SECRET}
      EMAIL_ENCRYPT_SALT: ${EMAIL_ENCRYPT_SALT}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER}
      ECONOMY_LLM_PROVIDER: ${ECONOMY_LLM_PROVIDER}
      ECONOMY_LLM_MODEL: ${ECONOMY_LLM_MODEL}
      CHAT_LLM_PROVIDER: ${ECONOMY_LLM_PROVIDER}
      CHAT_LLM_MODEL: ${ECONOMY_LLM_MODEL}
      NANO_LLM_PROVIDER: ${NANO_LLM_PROVIDER}
      NANO_LLM_MODEL: ${NANO_LLM_MODEL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      CRON_SECRET: ${CRON_SECRET}

  # -----------------------------------------------------------------------
  # Cron — internal HTTP pokes for endpoints that need periodic firing.
  # Mirrors upstream's cron container (see github.com/elie222/inbox-zero
  # docker-compose.yml). Hits the in-network `app` service on http://app:3000
  # so traffic never leaves the docker bridge.
  #
  # Endpoints this fork uses:
  #   - /api/cron/automation-jobs   every 5m   (drives queued rule executions)
  #   - /api/cron/scheduled-actions every 5m   (delayed actions like archive-after-N-days)
  #   - /api/watch/all              every 6h   (renews Gmail PubSub watches before 7d expiry)
  #   - /api/cron/digest            hourly     (per-account Schedule.nextOccurrenceAt drives actual send time)
  #
  # Endpoints intentionally NOT scheduled here:
  #   - /api/follow-up-reminders   — upstream feature, not in use in this fork
  #   - /api/meeting-briefs        — upstream feature, not in use in this fork
  #
  # NOTE: this fork's digest is heavily customized vs upstream — see
  # apps/web/utils/digest/run-daily-digest.ts and packages/resend/emails/.
  # The cron container hits /api/cron/digest hourly; runDailyDigest filters
  # accounts by digestSchedule.nextOccurrenceAt <= now, so the time-of-day
  # set in the UI (Settings → Digest) drives when the email actually sends.
  #
  # Secret handling: CRON_SECRET is interpolated by docker compose from
  # /opt/inbox-zero/.env at parse time and injected as a single env var.
  # No secret value is committed in this file.
  # -----------------------------------------------------------------------
  cron:
    image: alpine:latest
    container_name: inbox-zero-cron
    restart: unless-stopped
    depends_on:
      - app
    environment:
      CRON_SECRET: ${CRON_SECRET}
      TZ: America/New_York
    command: >
      sh -c "
        apk add --no-cache curl tzdata >/dev/null &&
        (
          while true; do
            curl -fsS -w '\n' -o - -H \"Authorization: Bearer $${CRON_SECRET}\" http://app:3000/api/cron/automation-jobs || echo '[cron] automation-jobs failed'
            sleep 300
          done
        ) &
        (
          while true; do
            curl -fsS -w '\n' -o - -H \"Authorization: Bearer $${CRON_SECRET}\" http://app:3000/api/cron/scheduled-actions || echo '[cron] scheduled-actions failed'
            sleep 300
          done
        ) &
        (
          while true; do
            curl -fsS -w '\n' -o - -H \"Authorization: Bearer $${CRON_SECRET}\" http://app:3000/api/watch/all || echo '[cron] watch/all failed'
            sleep 21600
          done
        ) &
        (
          # Digest tick: hit /api/cron/digest at the top of every hour.
          # runDailyDigest filters accounts by digestSchedule.nextOccurrenceAt,
          # so the actual send time is whatever the UI's digest schedule is set
          # to (rounded to the next hourly tick). TZ env on this container is
          # America/New_York for predictable log timestamps; the schedule check
          # itself runs in UTC against an absolute timestamp, so DST is handled
          # by Postgres + the per-account timezone.
          while true; do
            m=$$(date +%M); s=$$(date +%S)
            m=$${m#0}; s=$${s#0}
            sleep_for=$$((3600 - m*60 - s))
            echo \"[cron] digest sleeping $${sleep_for}s until next top-of-hour ($$(date))\"
            sleep $$sleep_for
            curl -fsS --max-time 360 -w '\n' -o - -H \"Authorization: Bearer $${CRON_SECRET}\" http://app:3000/api/cron/digest || echo '[cron] digest failed'
          done
        ) &
        wait
      "

volumes:
  postgres_data:
