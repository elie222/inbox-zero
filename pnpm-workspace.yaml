packages:
  - packages/*
  - apps/*

# Supply-chain hardening: block versions published <24h ago. Malicious npm releases
# are typically yanked within hours, so the cooldown blocks the attack window.
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@inboxzero/*"
  - "@inbox-zero/emulate"

overrides:
  "@hono/node-server": "1.19.14"
  "@tiptap/core": "2.27.2"
  "@types/react": "19.2.14"
  "@types/react-dom": "19.2.3"
  "@xmldom/xmldom": "0.8.13"
  axios: "1.15.2"
  fast-xml-parser: "5.7.3"
  js-yaml: "3.14.2"
  jws: "4.0.1"
  lodash: "4.18.1"
  next: "16.2.6"
  postcss: "8.5.14"
  svelte: "5.55.5"
  webpack: "5.106.2"

# Only reviewed dependencies may run install scripts.
allowBuilds:
  "@google/genai": true
  "@prisma/engines": true
  "@sentry/cli": true
  core-js: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  protobufjs: true
  sharp: true
  workerd: true
