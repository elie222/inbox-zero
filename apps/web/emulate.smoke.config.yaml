      client_secret: client_secret
      name: Inbox Zero Smoke
      redirect_uris:
        - __SMOKE_TEST_REDIRECT_URI__
  labels:
    - id: Label_smoke
      user_email: __SMOKE_TEST_EMAIL__
      name: Smoke
      color_background: "#DDEEFF"
      color_text: "#111111"
  messages:
